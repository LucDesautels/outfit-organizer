<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="A minimalist wardrobe organizer — pieces, ecosystems, fits." />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Wardrobe" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="stylesheet" href="css/styles.css" />
  <title>Wardrobe</title>
</head>
<body>
  <div id="app">
    <header id="topbar" class="topbar"></header>
    <main id="view" class="view"></main>
    <nav id="tabbar" class="tabbar"></nav>
  </div>

  <!-- overlay layers (modals, sheets, cropper, toasts) mount here -->
  <div id="overlay" class="overlay-root"></div>
  <div id="toast" class="toast-root"></div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register the service worker for offline + installability.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
